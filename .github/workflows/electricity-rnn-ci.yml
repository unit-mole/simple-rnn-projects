name: Electricity RNN CI

on:
  push:
    paths:
      - "01-electricity-consumption-forecasting/**"
      - ".github/workflows/electricity-rnn-ci.yml"
  pull_request:
    paths:
      - "01-electricity-consumption-forecasting/**"
      - ".github/workflows/electricity-rnn-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-electricity-consumption-forecasting

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scikit-learn pytest

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python source
        run: python -m compileall src app train_model.py

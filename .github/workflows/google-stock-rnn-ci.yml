name: Google Stock RNN CI

on:
  push:
    paths:
      - "02-google-stock-price-prediction/**"
      - ".github/workflows/google-stock-rnn-ci.yml"
  pull_request:
    paths:
      - "02-google-stock-price-prediction/**"
      - ".github/workflows/google-stock-rnn-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-google-stock-price-prediction

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas==2.3.3 numpy==2.2.6 scikit-learn==1.9.0 pytest==9.0.2

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python source
        run: python -m compileall src app train_model.py

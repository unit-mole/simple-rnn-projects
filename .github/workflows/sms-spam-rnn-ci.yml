name: SMS Spam Simple RNN CI

on:
  push:
    paths:
      - "04-sms-spam-detection/**"
      - ".github/workflows/sms-spam-rnn-ci.yml"
  pull_request:
    paths:
      - "04-sms-spam-detection/**"
      - ".github/workflows/sms-spam-rnn-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 04-sms-spam-detection

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            04-sms-spam-detection/requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python source
        run: |
          python -m compileall src app train_model.py validate_project.py runtime_smoke_test.py

      - name: Validate repository artifacts
        run: python validate_project.py

  runtime-smoke:
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 04-sms-spam-detection

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            04-sms-spam-detection/app/requirements.txt

      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Load saved model and run inference
        run: python runtime_smoke_test.py

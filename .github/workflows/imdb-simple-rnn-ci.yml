name: IMDb Simple RNN CI

on:
  push:
    paths:
      - "03-imdb-data-analysis/**"
      - ".github/workflows/imdb-simple-rnn-ci.yml"
  pull_request:
    paths:
      - "03-imdb-data-analysis/**"
      - ".github/workflows/imdb-simple-rnn-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03-imdb-data-analysis

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python source
        run: python -m compileall src app train_model.py

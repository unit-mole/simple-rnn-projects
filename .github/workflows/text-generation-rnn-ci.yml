name: Text Generation Simple RNN CI

on:
  push:
    branches: [main]
    paths:
      - "05-text-generation/**"
      - ".github/workflows/text-generation-rnn-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "05-text-generation/**"
      - ".github/workflows/text-generation-rnn-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: 05-text-generation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            05-text-generation/requirements.txt
            05-text-generation/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-ci.txt

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Compile Python files
        run: |
          python -m compileall app src tests train_model.py validate_project.py

      - name: Run automated tests
        run: python -m pytest -q

      - name: Validate project artifacts
        run: python validate_project.py --no-write-report
